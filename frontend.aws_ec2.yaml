plugin: amazon.aws.aws_ec2
regions:
- us-east-1
hostnames:
- private-ip-address
filters:
  instance-state-name: running
  tag:name: frontend-dev

compose:
  #This sets the ansible_hosts variable to connect with the private ip address without changing the hostname 
  ansible_host: private-ip-address
keyed_groups:
- separator: ''
key: tags.component